name: web_search
description: "根据用户需求进行网络搜索，抓取网页内容并整理成文字报告"
description_for_llm: "When the user needs detailed information from the web, use this tool to search the internet, fetch the top result pages, and return a consolidated text report. Pass the user's search intent as 'query'. Use when the user asks to search, look up, find information online, or get a report from the web."
stage: mid_conversation
type: code
input_schema:
  type: object
  properties:
    query:
      type: string
      description: "搜索关键词或用户的具体信息需求，如「某公司最新产品发布」「某技术 2024 教程」"
    max_results:
      type: integer
      description: "最多抓取几条搜索结果（1-10），默认 5"
      minimum: 1
      maximum: 10
    max_chars_per_page:
      type: integer
      description: "每个页面最多保留多少字符的正文，默认 6000"
  required:
    - query
handler: web_search
config:
  timeout: 25
