name: get_weather
description: "查询指定城市的天气"
description_for_llm: "Get current weather for a city. Call this when the user asks about weather, temperature, or conditions in a city. Pass the city name in 'city' (e.g. Beijing, 上海, Tokyo)."
stage: mid_conversation
type: prompt-api
input_schema:
  type: object
  properties:
    city:
      type: string
      description: "城市名称，如 Beijing、上海、Tokyo"
  required:
    - city
api_url: "https://wttr.in/{{.city}}?format=3&lang=zh"
api_method: GET
