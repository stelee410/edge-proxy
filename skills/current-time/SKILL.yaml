name: get_current_time
description: "获取当前的日期和时间"
description_for_llm: "Get the current date and time. Call this tool when the user asks about the current time, date, or needs time-related information."
stage: mid_conversation
type: prompt-based
input_schema:
  type: object
  properties:
    timezone:
      type: string
      description: "时区，如 Asia/Shanghai，可选"
prompt_template: |
  当前日期：{{._date}}
  当前时间：{{._time}}
  完整时间戳：{{._now}}
